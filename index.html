<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sleep Tracker">
<title>🌙 Sleep Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, 'Noto Sans JP', sans-serif;
    background: linear-gradient(135deg, #0f0c29 0%, #1a1a3e 50%, #0f0c29 100%);
    color: #e8e4ff;
    min-height: 100vh;
    padding-bottom: 40px;
    overflow-x: hidden;
  }
  header {
    text-align: center;
    padding: 48px 20px 16px;
    border-bottom: 1px solid rgba(150,130,255,0.15);
  }
  header h1 {
    font-size: 26px;
    font-weight: 700;
    background: linear-gradient(90deg, #a78bfa, #60a5fa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 0.04em;
  }
  header p { font-size: 13px; color: #a89fd8; margin-top: 6px; }

  /* TABS */
  .tabs {
    display: flex;
    justify-content: center;
    gap: 6px;
    padding: 16px 12px 0;
    flex-wrap: wrap;
  }
  .tab-btn {
    padding: 8px 16px;
    border-radius: 20px;
    border: 1px solid rgba(150,130,255,0.25);
    background: transparent;
    color: #8880aa;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .tab-btn.active {
    border-color: #a78bfa;
    background: rgba(167,139,250,0.18);
    color: #c4b5fd;
    font-weight: 700;
  }

  /* CARD */
  .card {
    background: rgba(255,255,255,0.05);
    border-radius: 16px;
    padding: 16px;
    margin: 12px 12px;
  }
  .section-title {
    font-size: 15px;
    font-weight: 700;
    color: #c4b5fd;
    margin-bottom: 14px;
  }

  /* FORM */
  .field-group { margin-bottom: 20px; }
  .field-label {
    font-size: 12px;
    color: #9d8fc7;
    font-weight: 600;
    display: block;
    margin-bottom: 8px;
  }
  input[type="date"],
  input[type="text"],
  input[type="number"] {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(167,139,250,0.25);
    border-radius: 10px;
    color: #e8e4ff;
    padding: 10px 14px;
    font-size: 15px;
    outline: none;
    font-family: inherit;
    -webkit-appearance: none;
  }
  input[type="time"] {
    background: transparent;
    border: none;
    color: #e8e4ff;
    font-size: 15px;
    outline: none;
    font-family: inherit;
    width: 100%;
    -webkit-appearance: none;
  }
  .time-row {
    display: flex;
    gap: 0;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(167,139,250,0.25);
    border-radius: 10px;
    overflow: hidden;
  }
  .time-col {
    flex: 1;
    padding: 10px 12px;
    min-width: 0;
  }
  .time-col:first-child {
    border-right: 1px solid rgba(167,139,250,0.2);
  }
  .time-sub-label { font-size: 11px; color: #9d8fc7; margin-bottom: 4px; }

  /* OPTION BUTTONS */
  .option-list { display: flex; flex-direction: column; gap: 8px; }
  .option-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 12px;
    border: 1px solid rgba(167,139,250,0.2);
    background: rgba(255,255,255,0.03);
    color: #9d8fc7;
    font-size: 13px;
    cursor: pointer;
    text-align: left;
    width: 100%;
    font-family: inherit;
    transition: all 0.15s;
  }
  .option-btn.active {
    border-color: #a78bfa;
    background: rgba(167,139,250,0.22);
    color: #e8e4ff;
  }
  .option-emoji { font-size: 20px; flex-shrink: 0; }
  .option-text { flex: 1; min-width: 0; }
  .option-label { font-weight: 700; color: #c4b5fd; }
  .option-btn.active .option-label { color: #e8e4ff; }
  .option-desc { font-size: 11px; color: #7070a0; margin-top: 1px; }
  .option-btn.active .option-desc { color: #c4b5fd; }
  .option-check { font-size: 14px; color: #a78bfa; flex-shrink: 0; }

  /* MULTI SELECT */
  .multi-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .multi-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 13px;
    border-radius: 24px;
    border: 1px solid rgba(96,165,250,0.2);
    background: rgba(255,255,255,0.04);
    color: #7090b0;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .multi-btn.active {
    border-color: #60a5fa;
    background: rgba(96,165,250,0.18);
    color: #bfdbfe;
    font-weight: 700;
  }

  /* TEMP ROW */
  .temp-row { display: flex; gap: 10px; }
  .temp-col { flex: 1; }
  .temp-inner { position: relative; }
  .temp-inner input { padding-right: 32px; }
  .temp-unit {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: #9d8fc7;
    font-size: 13px;
    pointer-events: none;
  }

  /* SAVE BUTTON */
  .save-btn {
    width: 100%;
    padding: 13px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(90deg, #7c3aed, #3b82f6);
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 4px;
    font-family: inherit;
  }
  .saved-badge { text-align: center; color: #4ade80; font-size: 13px; margin-top: 8px; font-weight: 600; }
  .hidden { display: none; }

  /* STATS */
  .stats-row { display: flex; gap: 10px; margin-bottom: 16px; }
  .stat-box {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 12px;
    text-align: center;
  }
  .stat-val { font-size: 18px; font-weight: 700; color: #a78bfa; }
  .stat-lab { font-size: 11px; color: #9d8fc7; margin-top: 2px; }

  /* CHARTS */
  .chart-wrap { position: relative; height: 200px; margin-bottom: 8px; }
  .chart-legend { display: flex; gap: 16px; font-size: 12px; color: #9d8fc7; margin-top: 8px; }

  /* ADVICE */
  .tip-card {
    background: rgba(167,139,250,0.08);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .tip-title { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
  .tip-body { font-size: 13px; color: #c4b5fd; line-height: 1.6; }
  .ai-btn {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid rgba(167,139,250,0.4);
    background: rgba(167,139,250,0.1);
    color: #c4b5fd;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    margin-bottom: 12px;
    font-family: inherit;
  }
  .ai-box {
    background: rgba(96,165,250,0.08);
    border-radius: 12px;
    padding: 16px;
    font-size: 13px;
    line-height: 1.8;
    color: #dbeafe;
    white-space: pre-wrap;
  }
  .divider { border-top: 1px solid rgba(167,139,250,0.15); margin: 20px 0 16px; }

  /* HISTORY */
  .history-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid rgba(167,139,250,0.1);
    font-size: 13px;
  }
  .history-date { font-weight: 700; margin-bottom: 3px; }
  .history-sub { color: #9d8fc7; font-size: 12px; }
  .history-temp { font-size: 11px; color: #fde68a; margin-top: 2px; }
  .history-right { text-align: right; }
  .history-dur { color: #a78bfa; font-weight: 700; }
  .history-detail { font-size: 11px; color: #9d8fc7; }
  .history-wake { font-size: 11px; color: #7dd3fc; }

  .sleep-time-display {
    text-align: center;
    font-size: 13px;
    color: #a78bfa;
    margin-bottom: 20px;
  }
  .sleep-time-display b { font-size: 22px; }

  .empty-msg { text-align: center; color: #9d8fc7; padding: 20px; }
</style>
</head>
<body>

<header>
  <h1>🌙 Sleep Tracker</h1>
  <p>睡眠を記録して、日中の眠気を改善しよう</p>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('log')">📝 記録</button>
  <button class="tab-btn" onclick="switchTab('graph')">📊 グラフ</button>
  <button class="tab-btn" onclick="switchTab('advice')">💡 アドバイス</button>
  <button class="tab-btn" onclick="switchTab('history')">📋 履歴</button>
</div>

<!-- LOG TAB -->
<div id="tab-log">
  <div class="card">
    <div class="section-title">今日の睡眠を記録</div>

    <div class="field-group">
      <label class="field-label">📅 日付</label>
      <input type="date" id="input-date">
    </div>

    <div class="field-group">
      <label class="field-label">🌙 就寝時刻 / 🌅 起床時刻</label>
      <div class="time-row">
        <div class="time-col">
          <div class="time-sub-label">🌙 就寝時刻</div>
          <input type="time" id="input-bedtime" value="23:00">
        </div>
        <div class="time-col">
          <div class="time-sub-label">🌅 起床時刻</div>
          <input type="time" id="input-waketime" value="06:30">
        </div>
      </div>
    </div>

    <div class="sleep-time-display">
      睡眠時間: <b id="duration-display">7.5時間</b>
    </div>

    <div class="field-group">
      <label class="field-label">😴 日中の眠気はどのくらいでしたか？</label>
      <div class="option-list" id="drowsiness-options"></div>
    </div>

    <div class="field-group">
      <label class="field-label">💪 今日の体調はどうですか？</label>
      <div class="option-list" id="condition-options"></div>
    </div>

    <div class="field-group">
      <label class="field-label">🌛 夜中に目が覚めましたか？</label>
      <div class="option-list" id="wakeup-options"></div>
    </div>

    <div class="field-group hidden" id="wakeup-reason-group">
      <label class="field-label">❓ 原因として思い当たることは？（複数選択可）</label>
      <div class="multi-list" id="wakeup-reason-options"></div>
    </div>

    <div class="field-group">
      <label class="field-label">🌡️ 気温（任意）</label>
      <div class="temp-row">
        <div class="temp-col">
          <div class="time-sub-label">朝の気温</div>
          <div class="temp-inner">
            <input type="number" id="input-temp-morning" placeholder="例: 18">
            <span class="temp-unit">°C</span>
          </div>
        </div>
        <div class="temp-col">
          <div class="time-sub-label">夜の気温</div>
          <div class="temp-inner">
            <input type="number" id="input-temp-night" placeholder="例: 14">
            <span class="temp-unit">°C</span>
          </div>
        </div>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label">🌤️ 今日の天気（任意）</label>
      <div class="option-list" id="weather-options"></div>
    </div>

    <div class="field-group">
      <label class="field-label">💧 湿度の感じ（任意）</label>
      <div class="option-list" id="humidity-options"></div>
    </div>

    <div class="field-group">
      <label class="field-label">📝 メモ（任意）</label>
      <input type="text" id="input-memo" placeholder="例: カフェイン多かった、運動した…">
    </div>

    <button class="save-btn" onclick="saveEntry()">記録を保存</button>
    <div class="saved-badge hidden" id="saved-badge">✅ 保存しました！</div>
  </div>
</div>

<!-- GRAPH TAB -->
<div id="tab-graph" class="hidden">
  <div id="graph-empty" class="card empty-msg">まだデータがありません。記録タブから睡眠を記録してください。</div>
  <div id="graph-content" class="hidden">
    <div class="card">
      <div class="stats-row" id="stats-row"></div>
    </div>
    <div class="card">
      <div class="section-title">睡眠時間の推移</div>
      <div class="chart-wrap"><canvas id="chart-sleep"></canvas></div>
    </div>
    <div class="card">
      <div class="section-title">眠気・体調の推移</div>
      <div class="chart-wrap"><canvas id="chart-drowsy"></canvas></div>
      <div class="chart-legend"><span>🟠 眠気（高いほど眠い）</span><span>🟢 体調（高いほど良い）</span></div>
    </div>
    <div class="card hidden" id="chart-temp-card">
      <div class="section-title">🌡️ 気温の推移</div>
      <div class="chart-wrap"><canvas id="chart-temp"></canvas></div>
      <div class="chart-legend"><span>🟡 朝の気温</span><span>🔵 夜の気温</span></div>
    </div>
  </div>
</div>

<!-- ADVICE TAB -->
<div id="tab-advice" class="hidden">
  <div class="card">
    <div class="section-title">💡 睡眠改善アドバイス</div>
    <div id="advice-list"></div>
    <div class="divider"></div>
    <div class="section-title">🤖 AIによる個別アドバイス</div>
    <p style="font-size:12px;color:#9d8fc7;margin-bottom:12px;">あなたの記録データをもとに、AIが具体的なアドバイスを生成します。</p>
    <button class="ai-btn" id="ai-btn" onclick="fetchAiAdvice()">✨ AIアドバイスを生成する</button>
    <div class="ai-box hidden" id="ai-box"></div>
  </div>
</div>

<!-- HISTORY TAB -->
<div id="tab-history" class="hidden">
  <div class="card">
    <div class="section-title">📋 記録一覧</div>
    <div id="history-list"></div>
  </div>
</div>

<script>
const STORAGE_KEY = 'sleep-tracker-v2';

const DROWSINESS = [
  { val: 1, label: 'ほぼなし', emoji: '😊', desc: '一日中スッキリ' },
  { val: 2, label: '少しある', emoji: '🙂', desc: '午後に少しだるい' },
  { val: 3, label: 'まあまあ', emoji: '😑', desc: '会議中など目が重い' },
  { val: 4, label: 'かなり眠い', emoji: '😪', desc: 'こっくりしそうになる' },
  { val: 5, label: '限界…', emoji: '😴', desc: '起きていられない' },
];
const CONDITIONS = [
  { val: 1, label: '最悪', emoji: '🤢', desc: '体が重く何もしたくない' },
  { val: 2, label: '悪い', emoji: '😞', desc: '頭痛・倦怠感がある' },
  { val: 3, label: '普通', emoji: '😐', desc: '特に問題はない' },
  { val: 4, label: '良い', emoji: '😄', desc: '元気に動ける' },
  { val: 5, label: '絶好調', emoji: '🌟', desc: 'エネルギーに満ちている' },
];
const WAKEUPS = [
  { val: 0, label: '起きなかった', emoji: '😌', desc: '朝まで熟睡できた' },
  { val: 1, label: '1回', emoji: '🌙', desc: '1度だけ目が覚めた' },
  { val: 2, label: '2回', emoji: '🌙🌙', desc: '2度目が覚めた' },
  { val: 3, label: '3回以上', emoji: '😩', desc: '何度も目が覚めた' },
];
const WAKEUP_REASONS = [
  { id: 'toilet', label: 'トイレ', emoji: '🚽' },
  { id: 'noise', label: '物音・騒音', emoji: '🔊' },
  { id: 'light', label: '光・明るさ', emoji: '💡' },
  { id: 'hot', label: '暑い・寒い', emoji: '🌡️' },
  { id: 'stress', label: 'ストレス・不安', emoji: '😰' },
  { id: 'dream', label: '夢・うなされた', emoji: '👻' },
  { id: 'unknown', label: '原因不明', emoji: '❓' },
];
const WEATHER_OPTS = [
  { val: 'sunny', label: '晴れ', emoji: '☀️', desc: '日差しが強くよく晴れている' },
  { val: 'cloudy', label: '曇り', emoji: '⛅', desc: '薄曇りで日差しが弱い' },
  { val: 'overcast', label: 'どんより', emoji: '☁️', desc: '厚い雲で暗い' },
  { val: 'rainy', label: '雨', emoji: '🌧️', desc: '雨が降っている' },
  { val: 'snowy', label: '雪', emoji: '❄️', desc: '雪が降っている' },
];
const HUMIDITY_OPTS = [
  { val: 'dry', label: '乾燥', emoji: '🌵', desc: '喉や肌が乾く感じ' },
  { val: 'normal', label: '普通', emoji: '💧', desc: '特に気にならない' },
  { val: 'humid', label: 'じめじめ', emoji: '💦', desc: '蒸し暑く不快な感じ' },
];

// State
let entries = [];
let form = { drowsiness: 2, condition: 3, wakeups: 0, wakeupReasons: [], weatherCondition: '', humidity: '' };
let charts = {};

// Load data
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) entries = JSON.parse(raw);
  } catch(e) {}
}
function saveData() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); } catch(e) {}
}

// Init date
function initDate() {
  document.getElementById('input-date').value = new Date().toISOString().slice(0, 10);
}

// Duration calc
function calcDuration(bed, wake) {
  const [bh, bm] = bed.split(':').map(Number);
  const [wh, wm] = wake.split(':').map(Number);
  let mins = (wh * 60 + wm) - (bh * 60 + bm);
  if (mins < 0) mins += 24 * 60;
  return Math.round((mins / 60) * 10) / 10;
}
function updateDuration() {
  const bed = document.getElementById('input-bedtime').value;
  const wake = document.getElementById('input-waketime').value;
  if (bed && wake) {
    document.getElementById('duration-display').textContent = calcDuration(bed, wake) + '時間';
  }
}

// Render option buttons
function renderOptions(containerId, options, selectedVal, onSelect, isMulti = false) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    const key = isMulti ? opt.id : opt.val;
    const isActive = isMulti ? form.wakeupReasons.includes(opt.id) : selectedVal === opt.val;
    btn.className = 'option-btn' + (isActive ? ' active' : '');
    btn.innerHTML = `
      <span class="option-emoji">${opt.emoji}</span>
      <div class="option-text">
        <div class="option-label">${opt.label}</div>
        ${opt.desc ? `<div class="option-desc">${opt.desc}</div>` : ''}
      </div>
      ${isActive ? '<span class="option-check">✓</span>' : ''}
    `;
    btn.onclick = () => { onSelect(key); };
    container.appendChild(btn);
  });
}

function renderMultiOptions() {
  const container = document.getElementById('wakeup-reason-options');
  container.innerHTML = '';
  WAKEUP_REASONS.forEach(opt => {
    const btn = document.createElement('button');
    const isActive = form.wakeupReasons.includes(opt.id);
    btn.className = 'multi-btn' + (isActive ? ' active' : '');
    btn.innerHTML = `<span>${opt.emoji}</span><span>${opt.label}</span>${isActive ? '<span style="font-size:11px;color:#60a5fa">✓</span>' : ''}`;
    btn.onclick = () => {
      if (form.wakeupReasons.includes(opt.id)) {
        form.wakeupReasons = form.wakeupReasons.filter(r => r !== opt.id);
      } else {
        form.wakeupReasons = [...form.wakeupReasons, opt.id];
      }
      renderMultiOptions();
    };
    container.appendChild(btn);
  });
}

function renderAllOptions() {
  renderOptions('drowsiness-options', DROWSINESS, form.drowsiness, (val) => {
    form.drowsiness = val;
    renderOptions('drowsiness-options', DROWSINESS, form.drowsiness, arguments.callee);
  });
  renderOptions('condition-options', CONDITIONS, form.condition, (val) => {
    form.condition = val;
    renderOptions('condition-options', CONDITIONS, form.condition, arguments.callee);
  });
  renderOptions('wakeup-options', WAKEUPS, form.wakeups, (val) => {
    form.wakeups = val;
    document.getElementById('wakeup-reason-group').classList.toggle('hidden', val === 0);
    if (val === 0) form.wakeupReasons = [];
    renderOptions('wakeup-options', WAKEUPS, form.wakeups, arguments.callee);
    renderMultiOptions();
  });
  renderOptions('weather-options', WEATHER_OPTS, form.weatherCondition, (val) => {
    form.weatherCondition = form.weatherCondition === val ? '' : val;
    renderOptions('weather-options', WEATHER_OPTS, form.weatherCondition, arguments.callee);
  });
  renderOptions('humidity-options', HUMIDITY_OPTS, form.humidity, (val) => {
    form.humidity = form.humidity === val ? '' : val;
    renderOptions('humidity-options', HUMIDITY_OPTS, form.humidity, arguments.callee);
  });
  renderMultiOptions();
}

// Save entry
function saveEntry() {
  const date = document.getElementById('input-date').value;
  const bedtime = document.getElementById('input-bedtime').value;
  const waketime = document.getElementById('input-waketime').value;
  const duration = calcDuration(bedtime, waketime);
  const entry = {
    id: Date.now(),
    date, bedtime, waketime, duration,
    drowsiness: form.drowsiness,
    condition: form.condition,
    wakeups: form.wakeups,
    wakeupReasons: [...form.wakeupReasons],
    tempMorning: document.getElementById('input-temp-morning').value,
    tempNight: document.getElementById('input-temp-night').value,
    weatherCondition: form.weatherCondition,
    humidity: form.humidity,
    memo: document.getElementById('input-memo').value,
  };
  entries = entries.filter(e => e.date !== date);
  entries.push(entry);
  entries.sort((a, b) => a.date.localeCompare(b.date));
  saveData();
  const badge = document.getElementById('saved-badge');
  badge.classList.remove('hidden');
  setTimeout(() => badge.classList.add('hidden'), 2000);
}

// Labels
function drowsinessLabel(v) { return DROWSINESS.find(o => o.val === v)?.label || ''; }
function conditionLabel(v) { return CONDITIONS.find(o => o.val === v)?.label || ''; }
function wakeupLabel(v) { return WAKEUPS.find(o => o.val === v)?.label || ''; }

// Tabs
function switchTab(tab) {
  ['log','graph','advice','history'].forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('hidden', t !== tab);
  });
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', ['log','graph','advice','history'][i] === tab);
  });
  if (tab === 'graph') renderGraphs();
  if (tab === 'advice') renderAdvice();
  if (tab === 'history') renderHistory();
}

// Charts
function renderGraphs() {
  const recent = entries.slice(-14);
  if (recent.length === 0) {
    document.getElementById('graph-empty').classList.remove('hidden');
    document.getElementById('graph-content').classList.add('hidden');
    return;
  }
  document.getElementById('graph-empty').classList.add('hidden');
  document.getElementById('graph-content').classList.remove('hidden');

  const labels = recent.map(e => e.date.slice(5));
  const cfg = { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { color: '#9d8fc7', font: { size: 10 } }, grid: { color: 'rgba(167,139,250,0.1)' } }, y: { ticks: { color: '#9d8fc7', font: { size: 10 } }, grid: { color: 'rgba(167,139,250,0.1)' } } } };

  // Stats
  const avgSleep = recent.reduce((s,e)=>s+e.duration,0)/recent.length;
  const avgDrowsy = recent.reduce((s,e)=>s+e.drowsiness,0)/recent.length;
  const avgCond = recent.reduce((s,e)=>s+e.condition,0)/recent.length;
  document.getElementById('stats-row').innerHTML = `
    <div class="stat-box"><div class="stat-val">${avgSleep.toFixed(1)}h</div><div class="stat-lab">平均睡眠時間</div></div>
    <div class="stat-box"><div class="stat-val">${drowsinessLabel(Math.round(avgDrowsy))}</div><div class="stat-lab">平均眠気</div></div>
    <div class="stat-box"><div class="stat-val">${conditionLabel(Math.round(avgCond))}</div><div class="stat-lab">平均体調</div></div>
  `;

  // Sleep chart
  if (charts.sleep) charts.sleep.destroy();
  charts.sleep = new Chart(document.getElementById('chart-sleep'), {
    type: 'bar',
    data: { labels, datasets: [{ data: recent.map(e=>e.duration), backgroundColor: '#7c3aed', borderRadius: 4 }] },
    options: { ...cfg, scales: { ...cfg.scales, y: { ...cfg.scales.y, min: 0, max: 12 } } }
  });

  // Drowsy/condition chart
  if (charts.drowsy) charts.drowsy.destroy();
  charts.drowsy = new Chart(document.getElementById('chart-drowsy'), {
    type: 'line',
    data: { labels, datasets: [
      { label: '眠気', data: recent.map(e=>e.drowsiness), borderColor: '#f97316', tension: 0.3, pointRadius: 3 },
      { label: '体調', data: recent.map(e=>e.condition), borderColor: '#4ade80', tension: 0.3, pointRadius: 3 },
    ]},
    options: { ...cfg, plugins: { legend: { display: false } }, scales: { ...cfg.scales, y: { ...cfg.scales.y, min: 1, max: 5 } } }
  });

  // Temp chart
  const hasTempData = recent.some(e => e.tempMorning || e.tempNight);
  document.getElementById('chart-temp-card').classList.toggle('hidden', !hasTempData);
  if (hasTempData) {
    if (charts.temp) charts.temp.destroy();
    charts.temp = new Chart(document.getElementById('chart-temp'), {
      type: 'line',
      data: { labels, datasets: [
        { label: '朝の気温', data: recent.map(e=>e.tempMorning?Number(e.tempMorning):null), borderColor: '#fbbf24', tension: 0.3, pointRadius: 3, spanGaps: true },
        { label: '夜の気温', data: recent.map(e=>e.tempNight?Number(e.tempNight):null), borderColor: '#60a5fa', tension: 0.3, pointRadius: 3, spanGaps: true },
      ]},
      options: cfg
    });
  }
}

// Advice
function renderAdvice() {
  const list = document.getElementById('advice-list');
  list.innerHTML = '';
  if (entries.length === 0) {
    list.innerHTML = '<p style="color:#9d8fc7;font-size:13px;margin-bottom:16px">まず記録タブでデータを入力するとアドバイスが表示されます。</p>';
    return;
  }
  const recent = entries.slice(-7);
  const avgSleep = recent.reduce((s,e)=>s+e.duration,0)/recent.length;
  const avgDrowsy = recent.reduce((s,e)=>s+e.drowsiness,0)/recent.length;
  const avgCond = recent.reduce((s,e)=>s+e.condition,0)/recent.length;
  const wakeupDays = recent.filter(e=>(e.wakeups||0)>0).length;
  const tips = [];
  if (avgSleep < 6) tips.push({ icon:'⏰', title:'睡眠時間が不足気味', body:'平均6時間未満です。7〜8時間を目標に就寝時間を早めてみましょう。' });
  else if (avgSleep > 9) tips.push({ icon:'🛌', title:'少し寝すぎかも', body:'長すぎる睡眠も疲労感の原因に。7〜9時間が理想的です。' });
  if (avgDrowsy >= 3.5) {
    tips.push({ icon:'☕', title:'日中の眠気が強い', body:'就寝1時間前のスマホ・カフェインを控え、室温を18〜20℃に調整してみましょう。' });
    tips.push({ icon:'🌞', title:'朝に光を浴びよう', body:'起床後すぐに日光を浴びることで体内時計がリセットされ、夜の眠気が改善しやすくなります。' });
  }
  if (avgCond <= 2.5) tips.push({ icon:'🧘', title:'体調が優れない日が続いています', body:'深呼吸・軽いストレッチを就寝前に取り入れてみてください。' });
  if (wakeupDays >= 3) tips.push({ icon:'🌛', title:'夜中に目が覚めることが多い', body:'中途覚醒が続いています。就寝前のカフェイン・アルコールを控え、寝室を暗く静かに保つと改善する場合があります。' });
  if (tips.length === 0) tips.push({ icon:'✨', title:'いい調子です！', body:`平均${avgSleep.toFixed(1)}時間の睡眠が取れています。この調子を維持しましょう！` });
  tips.forEach(tip => {
    const div = document.createElement('div');
    div.className = 'tip-card';
    div.innerHTML = `<div class="tip-title">${tip.icon} ${tip.title}</div><div class="tip-body">${tip.body}</div>`;
    list.appendChild(div);
  });
}

async function fetchAiAdvice() {
  if (entries.length === 0) return;
  const btn = document.getElementById('ai-btn');
  const box = document.getElementById('ai-box');
  btn.textContent = '⏳ 分析中...';
  btn.disabled = true;
  box.classList.add('hidden');
  const recent = entries.slice(-7);
  const summary = recent.map(e =>
    `${e.date}: 睡眠${e.duration}h, 眠気「${drowsinessLabel(e.drowsiness)}」, 体調「${conditionLabel(e.condition)}」, 覚醒「${wakeupLabel(e.wakeups||0)}」${e.tempMorning?`, 朝${e.tempMorning}°C`:''}${e.memo?', メモ: '+e.memo:''}`
  ).join('\n');
  const prompt = `あなたは睡眠専門のアドバイザーです。以下は直近の睡眠記録です：\n\n${summary}\n\nこのユーザーは「日中の眠気が強い」という悩みを抱えています。記録を分析して、具体的で実践しやすい改善アドバイスを3〜4点、箇条書きで日本語で教えてください。`;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, messages: [{ role: 'user', content: prompt }] })
    });
    const data = await res.json();
    const text = data.content?.map(b => b.text||'').join('') || 'アドバイスを取得できませんでした。';
    box.textContent = text;
    box.classList.remove('hidden');
  } catch(e) {
    box.textContent = '通信エラーが発生しました。インターネット接続を確認してください。';
    box.classList.remove('hidden');
  }
  btn.textContent = '✨ AIアドバイスを生成する';
  btn.disabled = false;
}

// History
function renderHistory() {
  const list = document.getElementById('history-list');
  list.innerHTML = '';
  if (entries.length === 0) {
    list.innerHTML = '<div class="empty-msg">まだ記録がありません</div>';
    return;
  }
  [...entries].reverse().forEach(e => {
    const div = document.createElement('div');
    div.className = 'history-item';
    div.innerHTML = `
      <div>
        <div class="history-date">${e.date}</div>
        <div class="history-sub">${e.bedtime}就寝 → ${e.waketime}起床${e.memo ? '　' + e.memo : ''}</div>
        ${(e.tempMorning||e.tempNight) ? `<div class="history-temp">${e.tempMorning?'朝'+e.tempMorning+'°C':''}${e.tempMorning&&e.tempNight?' / ':''}${e.tempNight?'夜'+e.tempNight+'°C':''}</div>` : ''}
      </div>
      <div class="history-right">
        <div class="history-dur">${e.duration}h</div>
        <div class="history-detail">眠気: ${drowsinessLabel(e.drowsiness)}</div>
        <div class="history-detail">体調: ${conditionLabel(e.condition)}</div>
        ${(e.wakeups||0)>0?`<div class="history-wake">覚醒: ${wakeupLabel(e.wakeups)}</div>`:''}
      </div>
    `;
    list.appendChild(div);
  });
}

// Init
loadData();
initDate();
renderAllOptions();
document.getElementById('input-bedtime').addEventListener('change', updateDuration);
document.getElementById('input-waketime').addEventListener('change', updateDuration);
updateDuration();
</script>
